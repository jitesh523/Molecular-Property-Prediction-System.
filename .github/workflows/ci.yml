name: CI

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Use specific torch cpu index for stability in headless runner
          pip install torch==2.2.1 --extra-index-url https://download.pytorch.org/whl/cpu
          pip install torch-geometric==2.5.2 rdkit==2023.9.5 numpy==1.26.4 pandas==2.2.1
          pip install scikit-learn==1.4.1.post1 xgboost==2.0.3 shap pydantic==2.6.3
          pip install fastapi uvicorn httpx matplotlib seaborn rich
          pip install -e .
          pip install pytest pytest-cov ruff bandit

      - name: Lint with Ruff
        run: |
          ruff check .
          ruff format --check .

      - name: Test with pytest + coverage
        run: |
          pytest tests/ --cov=molprop --cov-report=term-missing --cov-report=xml -q

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Bandit
        run: pip install bandit
      - name: Run Bandit
        run: bandit -r src/ -ll
