version: '3.8'

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - MODEL_TYPE=gat
      - MODEL_WEIGHTS=best_gat_bbbp.pt
      - MODEL_DATASET=bbbp
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - molprop-network

  dashboard:
    build: .
    command: streamlit run scripts/portfolio_dashboard.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    depends_on:
      - api
    networks:
      - molprop-network

networks:
  molprop-network:
    driver: bridge
